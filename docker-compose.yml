version: '3.8'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: flame
      POSTGRES_USER: flame_user
      POSTGRES_PASSWORD: flame_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  flame-server:
    build: ./server
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://flame_user:flame_pass@postgres:5432/flame
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis

volumes:
  pgdata:
